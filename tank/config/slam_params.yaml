/**:
  ros__parameters:
    # 1. Đồng bộ hệ tọa độ với xe tank của bạn
    odom_frame: odom
    map_frame: map
    base_frame: base_link   
    scan_topic: /scan
    
    use_sim_time: true
    mode: mapping

    # 2.  tọa độ từ Gazebo 
    transform_timeout: 0.5  # Chờ 0.5 giây trước khi báo lỗi
    tf_buffer_duration: 5.0 # Bộ nhớ đệm lưu tọa độ trong 5 giây
   
    # 3. Cấu hình bản đồ
    resolution: 0.05
    max_laser_range: 12.0
    minimum_time_interval: 0.5
    minimum_laser_range: 0.2
    minimum_travel_distance: 0.1

    map_update_interval: 0.5
    # ĐƯỜNG DẪN ĐẾN FILE BẢN ĐỒ (không bao gồm phần mở rộng .posegraph)
    map_file_name: /path/to/your/workspace/src/tank/maps/my_tank_map
    map_start_at_dock: true # Robot sẽ bắt đầu tại vị trí gốc của map
